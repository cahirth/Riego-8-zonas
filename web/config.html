<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Riego TLC - Ajustes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .modal-screen-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; overflow-y:auto; padding:20px 10px; box-sizing:border-box; }
        .modal-content-card { background:#fff; max-width:600px; margin:0 auto; border-radius:12px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <svg viewBox="0 0 24 24"><path d="M12,2.69C12,2.69 19,11.06 19,15.5A7,7 0 0,1 12,22.5A7,7 0 0,1 5,15.5C5,11.06 12,2.69 12,2.69Z"/></svg>
            <span>Riego Hidráulico TLC</span>
        </div>
        
        <div class="screen">
            <div class="config-section-title">
                <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4Z"/></svg>
                <span>Parámetros de Seguridad General</span>
            </div>
            <div class="zone-card" style="margin-bottom: 25px; border: 1px solid var(--warning);">
                <div class="zone-name" style="color: var(--warning);">Time-out Llenado de Tanque</div>
                <div class="timer-control">
                    <span>Límite Max:</span>
                    <input type="range" min="0" max="8" value="1" id="input-timeout-tanque" oninput="actualizarDisplayTimeout(this.value)">
                    <span class="time-display" id="display-timeout-tanque">1m</span>
                </div>
            </div>

            <div class="config-section-title" style="justify-content:space-between; display:flex; align-items:center;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <svg viewBox="0 0 24 24"><path d="M4,6H20V18H4M4,4A2,2 0 0,0 2,12V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6A2,2 0 0,0 20,4H4Z"/></svg>
                    <span>Cronogramas de Riego</span>
                </div>
                <button class="btn" style="width:auto; padding:6px 15px; font-size:12px; background:var(--success);" onclick="abrirEditorPrograma(null)">➕ Crear Programa</button>
            </div>

            <div id="programas-master-container"></div>

            <button class="btn btn-save" onclick="enviarConfiguracionFlashESP32()">
                <svg viewBox="0 0 24 24"><path d="M15,9H5V5H15M12,19A3,3 0 0,1 9,16A3,3 0 0,1 12,13A3,3 0 0,1 15,16A3,3 0 0,1 12,19M17,3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V7L17,3Z"/></svg> Sincronizar Todo con ESP32
            </button>
        </div>

        <div id="editor-modal-screen" class="modal-screen-overlay">
            <div class="modal-content-card">
                <h3 id="modal-titulo" style="margin-top:0; color:var(--dark); border-bottom:2px solid var(--primary); padding-bottom:5px;">Editar Programa</h3>
                
                <div style="margin-bottom:15px;">
                    <label style="font-weight:bold; font-size:14px;">Nombre del Programa:</label>
                    <input type="text" id="modal-nombre-prog" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc; font-size:15px; margin-top:5px; box-sizing:border-box;">
                </div>

                <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
                    <label style="font-weight:bold; font-size:14px;">Hora de Inicio (Start Time):</label>
                    <input type="time" id="modal-start-time" class="time-input-styled">
                </div>

                <div style="margin-bottom:15px;">
                    <label style="font-weight:bold; font-size:14px;">Días del Calendario (Fijar frecuencia):</label>
                    <div class="days-selector" id="modal-days-selector" style="margin-top:5px;"></div>
                </div>

                <div style="margin-bottom:20px;">
                    <label style="font-weight:bold; font-size:14px;">Asignación de Zonas y Tiempos de Carrera:</label>
                    <div id="modal-zones-assignment" style="margin-top:10px; max-height:220px; overflow-y:auto; padding-right:5px;"></div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn" style="background:#aaa;" onclick="cerrarEditorModal()">Cancelar</button>
                    <button class="btn" style="background:var(--success);" onclick="guardarChangesPrograma()">Guardar Programa</button>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item" style="cursor: pointer;" onclick="navegarHacia('monitor.html')">
                <svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg> Monitor
            </div>
            <div class="nav-item active" style="cursor: pointer;" onclick="navegarHacia('config.html')">
                <svg viewBox="0 0 24 24"><path d="M12,8A4,4 0 1,0 16,12A4,4 0 0,0 12,8M12,4A10,10 0 1,1 2,12A10,10 0 0,1 12,4Z"/></svg> Ajustes
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        window.onload = function() {
            local_recuperarEstadoGoblal();
            renderizarPantallaConfiguracion();
        };
    </script>
</body>
</html>

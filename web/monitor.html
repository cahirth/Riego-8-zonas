<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Riego TLC - Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" style="width: 24px; height: 24px;"><path d="M12,2.69C12,2.69 19,11.06 19,15.5A7,7 0 0,1 12,22.5A7,7 0 0,1 5,15.5C5,11.06 12,2.69 12,2.69Z"/></svg>
                <span style="font-weight: bold;">Riego Hidráulico TLC</span>
            </div>
            <button class="btn" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px; background: #0288d1; font-weight: bold; border-radius: 4px;" onclick="navegarHacia('config.html')">⚙️ Ajustes</button>
        </div>

        <div class="screen">
            <div class="status-box">
                <div class="status-title" id="display-fecha-hoy">Cargando fecha...</div>
                <div id="status-text" class="status-current">🏠 EN ESPERA (STANDBY)</div>
                <div class="progress-container" id="progress-wrapper">
                    <div class="progress-bar" id="cycle-progress"></div>
                </div>
                <div id="timer-remaining" style="font-size: 14px; color: #555; margin-top: 4px; font-weight: bold; text-align: center;"></div>
            </div>
            
            <div class="hardware-grid">
                <div class="hw-badge" id="hw-flotante">FLOTANTE: OK</div>
                <div class="hw-badge" id="hw-tanque">VALV. TANQUE: CERRADA</div>
                <div class="hw-badge" id="hw-bomba">BOMBA: OFF</div>
            </div>
            
            <div id="manual-buttons-container"></div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        window.onload = function() {
            local_recuperarEstadoGoblal();
            forzarParadaTotal(); 
        };
    </script>
</body>
</html>

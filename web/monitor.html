<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Riego TLC - Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <svg viewBox="0 0 24 24"><path d="M12,2.69C12,2.69 19,11.06 19,15.5A7,7 0 0,1 12,22.5A7,7 0 0,1 5,15.5C5,11.06 12,2.69 12,2.69Z"/></svg>
            <span>Riego Hidráulico TLC</span>
        </div>
        <div class="screen">
            <div class="status-box">
                <div class="status-title" id="display-fecha-hoy">Cargando fecha...</div>
                <div id="status-text" class="status-current">🏠 EN ESPERA (STANDBY)</div>
                <div class="progress-container" id="progress-wrapper">
                    <div class="progress-bar" id="cycle-progress"></div>
                </div>
                <div id="timer-remaining" style="font-size: 14px; color: #555;"></div>
            </div>
            <div class="hardware-grid">
                <div class="hw-badge" id="hw-flotante">FLOTANTE: TANQUE OK</div>
                <div class="hw-badge" id="hw-tanque">VALV. TANQUE: CERRADA (NC) 🔴</div>
                <div class="hw-badge" id="hw-bomba" style="grid-column: span 2;">BOMBA: OFF</div>
            </div>
            <div class="sim-panel">
                <span style="font-weight: bold; color: var(--warning);">Simulador Hardware:</span>
                <button id="btn-sim-flotante" class="btn" style="background: var(--warning); width: auto; padding: 8px 15px; font-size: 12px;" onclick="gestionarFlotanteSimulado()">Simular Falta de Agua (Llamar)</button>
            </div>
            <br>
            <button class="btn btn-stop" onclick="forzarParadaTotal()">
                <svg viewBox="0 0 24 24"><path d="M18,18H6V6H18V18Z"/></svg> STOP DE EMERGENCIA
            </button>
            
            <div id="manual-buttons-container"></div>
        </div>
        <div class="nav-bar">
            <div class="nav-item active" style="cursor: pointer;" onclick="navegarA('monitor.html')">
                <svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg> Monitor
            </div>
            <div class="nav-item" style="cursor: pointer;" onclick="navegarA('config.html')">
                <svg viewBox="0 0 24 24"><path d="M12,8A4,4 0 1,0 16,12A4,4 0 0,0 12,8M12,4A10,10 0 1,1 2,12A10,10 0 0,1 12,4Z"/></svg> Ajustes
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        window.onload = function() {
            local_recuperarEstadoGoblal();
            forzarParadaTotal(); 
        };
    </script>
</body>
</html>
